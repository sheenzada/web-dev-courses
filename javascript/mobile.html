<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile UI Wallpaper App</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .phone {
        width: 320px;
        height: 600px;
        border-radius: 30px;
        overflow: hidden;
        position: relative;
        background-size: cover;
        background-position: center;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        transition: background 0.5s;
    }

    .overlay {
        position: absolute;
        bottom: 0;
        width: 100%;
        padding: 15px;
        background: rgba(0,0,0,0.4);
        backdrop-filter: blur(10px);
    }

    .btn {
        display: block;
        width: 100%;
        margin: 5px 0;
        padding: 10px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        cursor: pointer;
        color: #fff;
    }

    .wall1 { background: #3498db; }
    .wall2 { background: #e74c3c; }
    .wall3 { background: #2ecc71; }

    .color-picker {
        margin-top: 10px;
        width: 100%;
        height: 40px;
        border: none;
        border-radius: 10px;
    }
</style>
</head>

<body>

<div class="phone" id="phone">
    <div class="overlay">
        <button class="btn wall1" onclick="setWallpaper(1)">Wallpaper 1</button>
        <button class="btn wall2" onclick="setWallpaper(2)">Wallpaper 2</button>
        <button class="btn wall3" onclick="setWallpaper(3)">Wallpaper 3</button>

        <input type="color" class="color-picker" onchange="changeTheme(this.value)">
    </div>
</div>

<script>
    const wallpapers = [
        "https://picsum.photos/400/700?random=1",
        "https://picsum.photos/400/700?random=2",
        "https://picsum.photos/400/700?random=3"
    ];

    function setWallpaper(index) {
        document.getElementById("phone").style.backgroundImage = 
            `url(${wallpapers[index - 1]})`;
    }

    function changeTheme(color) {
        document.querySelector(".overlay").style.background = color + "aa";
    }

    // default wallpaper
    setWallpaper(1);
</script>

</body>
</html>
